events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name bruceleecode.org localhost 127.0.0.1;

    client_max_body_size 50M;

    location = /api/chat {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://bruceleecode.org" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,User-Agent,Accept" always;
        add_header Access-Control-Max-Age "1728000" always;
        return 204;
      }

      proxy_pass http://127.0.0.1:11434/api/chat;
      proxy_set_header Host 127.0.0.1:11434;
      proxy_set_header Origin "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;

      add_header Access-Control-Allow-Origin "https://bruceleecode.org" always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization,Content-Type,User-Agent,Accept" always;
    }

    location = /api/generate {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://bruceleecode.org" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,User-Agent,Accept" always;
        add_header Access-Control-Max-Age "1728000" always;
        return 204;
      }

      proxy_pass http://127.0.0.1:11434/api/generate;
      proxy_set_header Host 127.0.0.1:11434;
      proxy_set_header Origin "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;

      add_header Access-Control-Allow-Origin "https://bruceleecode.org" always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization,Content-Type,User-Agent,Accept" always;
    }

    location / {
      proxy_pass http://127.0.0.1:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }
  }
}
